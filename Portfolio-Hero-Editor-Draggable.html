<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Hero Editor - Draggable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#d9dbdf; --grid:rgba(0,0,0,.04); --text:#1f2827;
      --blue:#1736c6; --yellow:#f5ea18; --white:#fff;
      --panelW: 360px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;font-family:"Inter","PingFang SC","Microsoft YaHei",sans-serif}
    body{
      background:var(--bg);
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size:72px 72px,72px 72px;
      overflow:hidden;
    }

    .app{display:flex; width:100%; height:100%;}
    .stage{
      flex:1; min-width:0; position:relative;
      display:grid; place-items:center; padding:24px;
    }

    .canvas{
      position:relative;
      width:min(1100px,95vw);
      height:min(700px,82vh);
      transform-origin:center;
      border-radius:10px;
      outline:1px dashed #00000010;
      background:transparent;
    }

    .title{
      position:absolute; margin:0; color:var(--text);
      font-size:clamp(84px,15vw,220px); line-height:.9; font-weight:900; letter-spacing:-.02em;
      will-change:transform,opacity,filter,left,top;
    }
    .tag{position:absolute; display:inline-flex; align-items:center; justify-content:center; border-radius:12px; font-weight:800; user-select:none; will-change:transform,opacity,filter,left,top;}
    .tag-uiux{
      color:var(--blue); border:4px solid var(--blue); background:transparent;
      font-size:clamp(28px,3vw,58px); letter-spacing:.02em;
    }
    .tag-uiux .corner{
      position:absolute; width:12px;height:12px;border:3px solid var(--blue);background:var(--bg);border-radius:4px;
    }
    .tl{left:-12px;top:-12px}.tr{right:-12px;top:-12px}.bl{left:-12px;bottom:-12px}.br{right:-12px;bottom:-12px}
    .tag-year{color:var(--blue);background:var(--yellow);border-radius:20px;}
    .status{
      position:absolute; display:inline-flex; align-items:center; justify-content:center;
      text-decoration:none; color:var(--white); background:var(--blue); border-radius:28px; font-weight:700; line-height:1;
      transition:transform .2s ease, box-shadow .2s ease;
      will-change:transform,opacity,filter,left,top;
    }
    .status:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(23,54,198,.25)}
    .arrow{position:absolute;will-change:transform,opacity,filter,left,top;}
    .arrow::before{
      content:"";position:absolute;inset:0;background:var(--blue);
      clip-path:polygon(0 50%,100% 0,70% 48%,100% 100%);border-radius:8px;
    }

    /* 拖拽视觉 */
    .draggable{cursor:grab}
    .draggable.dragging{cursor:grabbing}
    .draggable.selected{outline:2px dashed #1736c699; outline-offset:6px}

    .tip{
      position:absolute;left:12px;top:12px;font-size:12px;color:#222;background:#ffffffc7;
      border:1px solid #00000014;border-radius:8px;padding:6px 8px;backdrop-filter: blur(4px);
    }

    .reveal,.reveal-left,.reveal-right,.reveal-pop{opacity:0}
    .reveal{filter:blur(6px);transform:translateY(24px) scale(.98);animation:revealUp var(--dur,700ms) cubic-bezier(.2,.65,.2,1) forwards;animation-delay:var(--delay,0ms)}
    .reveal-left{filter:blur(6px);transform:translateX(-30px) rotate(var(--rot,0deg)) scale(.96);animation:revealLeft var(--dur,700ms) cubic-bezier(.2,.65,.2,1) forwards;animation-delay:var(--delay,0ms)}
    .reveal-right{filter:blur(6px);transform:translateX(30px) rotate(var(--rot,0deg)) scale(.96);animation:revealRight var(--dur,700ms) cubic-bezier(.2,.65,.2,1) forwards;animation-delay:var(--delay,0ms)}
    .reveal-pop{filter:blur(4px);transform:scale(.86) rotate(var(--rot,0deg));animation:revealPop var(--dur,680ms) cubic-bezier(.2,.7,.2,1.1) forwards;animation-delay:var(--delay,0ms)}
    @keyframes revealUp{to{opacity:1;filter:blur(0);transform:translateY(0) scale(1)}}
    @keyframes revealLeft{to{opacity:1;filter:blur(0);transform:translateX(0) rotate(var(--rot,0deg)) scale(1)}}
    @keyframes revealRight{to{opacity:1;filter:blur(0);transform:translateX(0) rotate(var(--rot,0deg)) scale(1)}}
    @keyframes revealPop{to{opacity:1;filter:blur(0);transform:scale(1) rotate(var(--rot,0deg))}}

    /* Panel */
    .panel{
      width:var(--panelW); max-width:42vw; height:100%;
      background:#ffffffea; backdrop-filter: blur(6px);
      border-left:1px solid #00000010;
      overflow:auto; padding:14px 14px 88px;
    }
    .panel h2{margin:8px 4px 10px;font-size:16px}
    .group{border:1px solid #00000012; border-radius:12px; padding:10px; margin:10px 0; background:#fff;}
    .group h3{margin:0 0 8px;font-size:13px;color:#333}
    .row{display:grid;grid-template-columns:95px 1fr;gap:8px;align-items:center;margin:6px 0}
    .row label{font-size:12px;color:#444}
    .row input[type="text"], .row input[type="number"], .row textarea{
      width:100%; padding:8px 9px; border:1px solid #00000020; border-radius:8px; font-size:12px; background:#fff;
    }
    .row input[type="color"]{width:100%;height:34px;border:none;background:transparent;padding:0}
    .row input[type="range"]{width:100%}
    .row .inline{display:flex;gap:6px}
    .hint{font-size:11px;color:#666;line-height:1.4}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap}
    button{border:none; background:#1736c6; color:#fff; padding:9px 10px; border-radius:8px; font-size:12px; cursor:pointer;}
    button.ghost{background:#eef2ff;color:#1736c6}
    button.warn{background:#e11d48}
    @media (max-width: 760px){
      .app{flex-direction:column}
      .panel{width:100%;max-width:100%;height:46vh;border-left:none;border-top:1px solid #00000012}
      .stage{height:54vh}
      .tip{display:none}
    }
  </style>
</head>
<body>
<div class="app">
  <section class="stage">
    <div class="tip">拖拽元素可直接定位（按住鼠标左键）。</div>
    <section id="canvas" class="canvas">
      <div id="tagUIUX" class="tag tag-uiux draggable reveal-left" data-key="uiux">
        <span id="uiuxText">UI/UX</span>
        <i class="corner tl"></i><i class="corner tr"></i><i class="corner bl"></i><i class="corner br"></i>
      </div>
      <h1 id="title" class="title draggable reveal" data-key="title">Portfolio</h1>
      <div id="tagYear" class="tag tag-year draggable reveal-pop" data-key="year">2024–2025</div>
      <div id="arrow" class="arrow draggable reveal-right" data-key="arrow" aria-hidden="true"></div>
      <a id="status" class="status draggable reveal-right" data-key="status" href="javascript:void(0)">求职中 ✨</a>
    </section>
  </section>

  <aside class="panel">
    <h2>参数面板（可拖拽版）</h2>

    <div class="group">
      <h3>文字</h3>
      <div class="row"><label>主标题</label><input id="f-title" type="text"></div>
      <div class="row"><label>UI/UX</label><input id="f-uiux" type="text"></div>
      <div class="row"><label>年份</label><input id="f-year" type="text"></div>
      <div class="row"><label>状态</label><input id="f-status" type="text"></div>
    </div>

    <div class="group">
      <h3>颜色</h3>
      <div class="row"><label>背景</label><input id="c-bg" type="color"></div>
      <div class="row"><label>网格</label><input id="c-grid" type="text"></div>
      <div class="row"><label>主文字</label><input id="c-text" type="color"></div>
      <div class="row"><label>蓝色</label><input id="c-blue" type="color"></div>
      <div class="row"><label>黄色</label><input id="c-yellow" type="color"></div>
    </div>

    <div class="group">
      <h3>位置/旋转（拖拽后自动同步）</h3>
      <div class="row"><label>Title X/Y</label><div class="inline"><input id="t-left" type="number"><input id="t-top" type="number"></div></div>
      <div class="row"><label>Title 字号</label><input id="t-size" type="text"></div>

      <div class="row"><label>UIUX X/Y</label><div class="inline"><input id="u-left" type="number"><input id="u-top" type="number"></div></div>
      <div class="row"><label>UIUX 旋转</label><input id="u-rot" type="number"></div>

      <div class="row"><label>Year X/Y</label><div class="inline"><input id="y-left" type="number"><input id="y-top" type="number"></div></div>
      <div class="row"><label>Year 旋转</label><input id="y-rot" type="number"></div>

      <div class="row"><label>Arrow X/Y</label><div class="inline"><input id="a-left" type="number"><input id="a-top" type="number"></div></div>
      <div class="row"><label>Arrow 旋转</label><input id="a-rot" type="number"></div>

      <div class="row"><label>Status X/Y</label><div class="inline"><input id="s-left" type="number"><input id="s-top" type="number"></div></div>
      <div class="row"><label>Status 旋转</label><input id="s-rot" type="number"></div>
    </div>

    <div class="group">
      <h3>动画</h3>
      <div class="row"><label>启用动画</label><input id="an-enabled" type="checkbox"></div>
      <div class="row"><label>Title 延迟</label><input id="an-title-delay" type="range" min="0" max="2000" step="10"></div>
      <div class="row"><label>UIUX 延迟</label><input id="an-uiux-delay" type="range" min="0" max="2000" step="10"></div>
      <div class="row"><label>Year 延迟</label><input id="an-year-delay" type="range" min="0" max="2000" step="10"></div>
      <div class="row"><label>Arrow 延迟</label><input id="an-arrow-delay" type="range" min="0" max="2000" step="10"></div>
      <div class="row"><label>Status 延迟</label><input id="an-status-delay" type="range" min="0" max="2000" step="10"></div>
      <div class="row"><label>重播动画</label><button id="replay" class="ghost">Replay</button></div>
    </div>

    <div class="group">
      <h3>JSON</h3>
      <div class="btn-row">
        <button id="copyJson">复制 JSON</button>
        <button id="downloadJson" class="ghost">下载 JSON</button>
        <button id="loadJson" class="ghost">导入 JSON</button>
        <button id="reset" class="warn">重置</button>
      </div>
      <p class="hint">可保存配置，后续继续编辑。</p>
      <div class="row" style="grid-template-columns:1fr"><textarea id="jsonArea" rows="6"></textarea></div>
    </div>
  </aside>
</div>

<script>
const DEFAULT_CONFIG = {
  text:{ title:"Portfolio", uiux:"UI/UX", year:"2024–2025", status:"求职中 ✨" },
  colors:{ bg:"#d9dbdf", grid:"rgba(0,0,0,0.04)", text:"#1f2827", blue:"#1736c6", yellow:"#f5ea18", white:"#ffffff" },
  canvas:{ width:"min(1100px,95vw)", height:"min(700px,82vh)" },
  layout:{
    title:{ left:"80px", top:"220px", fontSize:"clamp(84px,15vw,220px)", rotate:"0deg" },
    uiux:{ left:"320px", top:"145px", padding:"8px 30px", fontSize:"clamp(28px,3vw,58px)", rotate:"-8deg", borderWidth:"4px" },
    year:{ left:"140px", top:"490px", padding:"14px 28px", fontSize:"clamp(24px,2vw,42px)", rotate:"6deg", radius:"20px" },
    arrow:{ left:"670px", top:"535px", size:"70px", rotate:"22deg" },
    status:{ left:"720px", top:"610px", padding:"14px 30px", fontSize:"clamp(24px,2vw,44px)", rotate:"0deg", radius:"28px" }
  },
  animation:{
    enabled:true,
    items:{
      title:{ type:"reveal", delay:120, dur:820 },
      uiux:{ type:"reveal-left", delay:260, dur:720 },
      year:{ type:"reveal-pop", delay:420, dur:680 },
      arrow:{ type:"reveal-right", delay:520, dur:620 },
      status:{ type:"reveal-right", delay:620, dur:680 }
    }
  }
};

let CONFIG = structuredClone(DEFAULT_CONFIG);

const E = {
  canvas:document.getElementById("canvas"),
  title:document.getElementById("title"),
  uiux:document.getElementById("tagUIUX"),
  uiuxText:document.getElementById("uiuxText"),
  year:document.getElementById("tagYear"),
  arrow:document.getElementById("arrow"),
  status:document.getElementById("status"),
  json:document.getElementById("jsonArea")
};

const keyToNode = { title:E.title, uiux:E.uiux, year:E.year, arrow:E.arrow, status:E.status };

function setPos(node, obj){ node.style.left=obj.left; node.style.top=obj.top; }
function px(n){ return `${Math.round(n)}px`; }
function toNum(v){ return Number(String(v).replace("px","").replace("deg",""))||0; }

function applyAnimation(cfg){
  const map={title:E.title,uiux:E.uiux,year:E.year,arrow:E.arrow,status:E.status};
  Object.values(map).forEach(n=>{
    n.classList.remove("reveal","reveal-left","reveal-right","reveal-pop");
    n.style.removeProperty("--delay"); n.style.removeProperty("--dur");
    n.style.opacity=""; n.style.filter="";
  });
  if(!cfg.enabled){ Object.values(map).forEach(n=>{n.style.opacity="1";n.style.filter="none";}); return; }
  for(const k in cfg.items){
    const n=map[k], a=cfg.items[k]; if(!n||!a) continue;
    n.classList.add(a.type||"reveal");
    n.style.setProperty("--delay",`${a.delay||0}ms`);
    n.style.setProperty("--dur",`${a.dur||700}ms`);
  }
}
function applyConfig(c){
  const root=document.documentElement;
  root.style.setProperty("--bg",c.colors.bg);
  root.style.setProperty("--grid",c.colors.grid);
  root.style.setProperty("--text",c.colors.text);
  root.style.setProperty("--blue",c.colors.blue);
  root.style.setProperty("--yellow",c.colors.yellow);
  root.style.setProperty("--white",c.colors.white);

  E.canvas.style.width=c.canvas.width; E.canvas.style.height=c.canvas.height;

  E.title.textContent=c.text.title;
  E.uiuxText.textContent=c.text.uiux;
  E.year.textContent=c.text.year;
  E.status.textContent=c.text.status;

  setPos(E.title,c.layout.title);
  E.title.style.fontSize=c.layout.title.fontSize;
  E.title.style.transform=`rotate(${c.layout.title.rotate})`;

  setPos(E.uiux,c.layout.uiux);
  E.uiux.style.padding=c.layout.uiux.padding;
  E.uiux.style.fontSize=c.layout.uiux.fontSize;
  E.uiux.style.borderWidth=c.layout.uiux.borderWidth;
  E.uiux.style.transform=`rotate(${c.layout.uiux.rotate})`;
  E.uiux.style.setProperty("--rot",c.layout.uiux.rotate);

  setPos(E.year,c.layout.year);
  E.year.style.padding=c.layout.year.padding;
  E.year.style.fontSize=c.layout.year.fontSize;
  E.year.style.borderRadius=c.layout.year.radius;
  E.year.style.transform=`rotate(${c.layout.year.rotate})`;
  E.year.style.setProperty("--rot",c.layout.year.rotate);

  setPos(E.arrow,c.layout.arrow);
  E.arrow.style.width=c.layout.arrow.size; E.arrow.style.height=c.layout.arrow.size;
  E.arrow.style.transform=`rotate(${c.layout.arrow.rotate})`;
  E.arrow.style.setProperty("--rot",c.layout.arrow.rotate);

  setPos(E.status,c.layout.status);
  E.status.style.padding=c.layout.status.padding;
  E.status.style.fontSize=c.layout.status.fontSize;
  E.status.style.borderRadius=c.layout.status.radius;
  E.status.style.transform=`rotate(${c.layout.status.rotate})`;
  E.status.style.setProperty("--rot",c.layout.status.rotate);

  applyAnimation(c.animation);
  E.json.value = JSON.stringify(c,null,2);
}
function replayAnimation(){
  [E.title,E.uiux,E.year,E.arrow,E.status].forEach(n=>{
    const cls=[...n.classList].filter(c=>["reveal","reveal-left","reveal-right","reveal-pop"].includes(c));
    n.classList.remove(...cls); void n.offsetWidth;
  });
  applyAnimation(CONFIG.animation);
}

/* ===== 拖拽 ===== */
let dragState = null; // {key,node,startX,startY,startLeft,startTop}
function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }

function beginDrag(e, node, key){
  if(e.button!==0) return;
  e.preventDefault();
  const rect = E.canvas.getBoundingClientRect();
  const nRect = node.getBoundingClientRect();

  const startLeft = toNum(CONFIG.layout[key].left);
  const startTop = toNum(CONFIG.layout[key].top);

  dragState = {
    key, node,
    startX:e.clientX, startY:e.clientY,
    startLeft, startTop,
    canvasRect:rect,
    nodeW:nRect.width, nodeH:nRect.height
  };

  document.querySelectorAll(".draggable").forEach(x=>x.classList.remove("selected"));
  node.classList.add("selected","dragging");

  window.addEventListener("pointermove", onDragMove);
  window.addEventListener("pointerup", endDrag, { once:true });
}
function onDragMove(e){
  if(!dragState) return;
  const d = dragState;
  const dx = e.clientX - d.startX;
  const dy = e.clientY - d.startY;

  let nextLeft = d.startLeft + dx;
  let nextTop  = d.startTop + dy;

  // 限制在画布范围内
  const maxL = d.canvasRect.width - d.nodeW;
  const maxT = d.canvasRect.height - d.nodeH;
  nextLeft = clamp(nextLeft, 0, Math.max(0,maxL));
  nextTop  = clamp(nextTop, 0, Math.max(0,maxT));

  CONFIG.layout[d.key].left = px(nextLeft);
  CONFIG.layout[d.key].top  = px(nextTop);

  d.node.style.left = CONFIG.layout[d.key].left;
  d.node.style.top  = CONFIG.layout[d.key].top;

  syncPositionInputs();
  E.json.value = JSON.stringify(CONFIG,null,2);
}
function endDrag(){
  if(!dragState) return;
  dragState.node.classList.remove("dragging");
  dragState = null;
  window.removeEventListener("pointermove", onDragMove);
}

function enableDrag(){
  Object.entries(keyToNode).forEach(([key,node])=>{
    node.addEventListener("pointerdown",(e)=>beginDrag(e,node,key));
  });
}

/* ===== 面板绑定 ===== */
function fillInputsFromConfig(c){
  const g=id=>document.getElementById(id);
  g("f-title").value=c.text.title; g("f-uiux").value=c.text.uiux; g("f-year").value=c.text.year; g("f-status").value=c.text.status;

  g("c-bg").value=c.colors.bg; g("c-grid").value=c.colors.grid; g("c-text").value=c.colors.text; g("c-blue").value=c.colors.blue; g("c-yellow").value=c.colors.yellow;

  syncPositionInputs();
  g("t-size").value=c.layout.title.fontSize;
  g("u-rot").value=toNum(c.layout.uiux.rotate);
  g("y-rot").value=toNum(c.layout.year.rotate);
  g("a-rot").value=toNum(c.layout.arrow.rotate);
  g("s-rot").value=toNum(c.layout.status.rotate);

  g("an-enabled").checked=c.animation.enabled;
  g("an-title-delay").value=c.animation.items.title.delay;
  g("an-uiux-delay").value=c.animation.items.uiux.delay;
  g("an-year-delay").value=c.animation.items.year.delay;
  g("an-arrow-delay").value=c.animation.items.arrow.delay;
  g("an-status-delay").value=c.animation.items.status.delay;

  E.json.value=JSON.stringify(c,null,2);
}
function syncPositionInputs(){
  const g=id=>document.getElementById(id);
  g("t-left").value=toNum(CONFIG.layout.title.left); g("t-top").value=toNum(CONFIG.layout.title.top);
  g("u-left").value=toNum(CONFIG.layout.uiux.left); g("u-top").value=toNum(CONFIG.layout.uiux.top);
  g("y-left").value=toNum(CONFIG.layout.year.left); g("y-top").value=toNum(CONFIG.layout.year.top);
  g("a-left").value=toNum(CONFIG.layout.arrow.left); g("a-top").value=toNum(CONFIG.layout.arrow.top);
  g("s-left").value=toNum(CONFIG.layout.status.left); g("s-top").value=toNum(CONFIG.layout.status.top);
}
function bindInputs(){
  const g=id=>document.getElementById(id);
  const setPX=(obj,key,val)=>obj[key]=`${Number(val)}px`;
  const setDEG=(obj,val)=>obj.rotate=`${Number(val)}deg`;

  g("f-title").oninput=e=>{CONFIG.text.title=e.target.value;applyConfig(CONFIG)};
  g("f-uiux").oninput=e=>{CONFIG.text.uiux=e.target.value;applyConfig(CONFIG)};
  g("f-year").oninput=e=>{CONFIG.text.year=e.target.value;applyConfig(CONFIG)};
  g("f-status").oninput=e=>{CONFIG.text.status=e.target.value;applyConfig(CONFIG)};

  g("c-bg").oninput=e=>{CONFIG.colors.bg=e.target.value;applyConfig(CONFIG)};
  g("c-grid").oninput=e=>{CONFIG.colors.grid=e.target.value||"rgba(0,0,0,0.04)";applyConfig(CONFIG)};
  g("c-text").oninput=e=>{CONFIG.colors.text=e.target.value;applyConfig(CONFIG)};
  g("c-blue").oninput=e=>{CONFIG.colors.blue=e.target.value;applyConfig(CONFIG)};
  g("c-yellow").oninput=e=>{CONFIG.colors.yellow=e.target.value;applyConfig(CONFIG)};

  g("t-left").oninput=e=>{setPX(CONFIG.layout.title,"left",e.target.value);applyConfig(CONFIG)};
  g("t-top").oninput=e=>{setPX(CONFIG.layout.title,"top",e.target.value);applyConfig(CONFIG)};
  g("t-size").oninput=e=>{CONFIG.layout.title.fontSize=e.target.value;applyConfig(CONFIG)};

  g("u-left").oninput=e=>{setPX(CONFIG.layout.uiux,"left",e.target.value);applyConfig(CONFIG)};
  g("u-top").oninput=e=>{setPX(CONFIG.layout.uiux,"top",e.target.value);applyConfig(CONFIG)};
  g("u-rot").oninput=e=>{setDEG(CONFIG.layout.uiux,e.target.value);applyConfig(CONFIG)};

  g("y-left").oninput=e=>{setPX(CONFIG.layout.year,"left",e.target.value);applyConfig(CONFIG)};
  g("y-top").oninput=e=>{setPX(CONFIG.layout.year,"top",e.target.value);applyConfig(CONFIG)};
  g("y-rot").oninput=e=>{setDEG(CONFIG.layout.year,e.target.value);applyConfig(CONFIG)};

  g("a-left").oninput=e=>{setPX(CONFIG.layout.arrow,"left",e.target.value);applyConfig(CONFIG)};
  g("a-top").oninput=e=>{setPX(CONFIG.layout.arrow,"top",e.target.value);applyConfig(CONFIG)};
  g("a-rot").oninput=e=>{setDEG(CONFIG.layout.arrow,e.target.value);applyConfig(CONFIG)};

  g("s-left").oninput=e=>{setPX(CONFIG.layout.status,"left",e.target.value);applyConfig(CONFIG)};
  g("s-top").oninput=e=>{setPX(CONFIG.layout.status,"top",e.target.value);applyConfig(CONFIG)};
  g("s-rot").oninput=e=>{setDEG(CONFIG.layout.status,e.target.value);applyConfig(CONFIG)};

  g("an-enabled").onchange=e=>{CONFIG.animation.enabled=e.target.checked;applyConfig(CONFIG)};
  g("an-title-delay").oninput=e=>{CONFIG.animation.items.title.delay=+e.target.value;applyConfig(CONFIG)};
  g("an-uiux-delay").oninput=e=>{CONFIG.animation.items.uiux.delay=+e.target.value;applyConfig(CONFIG)};
  g("an-year-delay").oninput=e=>{CONFIG.animation.items.year.delay=+e.target.value;applyConfig(CONFIG)};
  g("an-arrow-delay").oninput=e=>{CONFIG.animation.items.arrow.delay=+e.target.value;applyConfig(CONFIG)};
  g("an-status-delay").oninput=e=>{CONFIG.animation.items.status.delay=+e.target.value;applyConfig(CONFIG)};
  g("replay").onclick=()=>replayAnimation();

  g("copyJson").onclick=async()=>{
    const txt=JSON.stringify(CONFIG,null,2);
    try{ await navigator.clipboard.writeText(txt); alert("已复制 JSON"); }
    catch{ alert("复制失败，请手动复制"); }
  };
  g("downloadJson").onclick=()=>{
    const blob=new Blob([JSON.stringify(CONFIG,null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob); a.download="portfolio-config.json"; a.click();
    URL.revokeObjectURL(a.href);
  };
  g("loadJson").onclick=()=>{
    const input=document.createElement("input");
    input.type="file"; input.accept=".json,application/json";
    input.onchange=()=>{
      const f=input.files?.[0]; if(!f) return;
      const r=new FileReader();
      r.onload=()=>{
        try{
          CONFIG=JSON.parse(String(r.result));
          fillInputsFromConfig(CONFIG);
          applyConfig(CONFIG);
          replayAnimation();
          alert("导入成功");
        }catch{ alert("JSON 格式错误"); }
      };
      r.readAsText(f);
    };
    input.click();
  };
  g("reset").onclick=()=>{
    CONFIG=structuredClone(DEFAULT_CONFIG);
    fillInputsFromConfig(CONFIG);
    applyConfig(CONFIG);
    replayAnimation();
  };
}

enableDrag();
bindInputs();
fillInputsFromConfig(CONFIG);
applyConfig(CONFIG);

window.CONFIG=CONFIG;
window.applyConfig=applyConfig;
</script>
</body>
</html>
