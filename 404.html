<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 / 页面未找到</title>
  <style>
    :root{
      color-scheme:light;
      --bg:#d9dbdf;
      --grid:rgba(0,0,0,.04);
      --text:#1f2827;
      --muted:#5e6967;
      --blue:#1736c6;
      --yellow:#f5ea18;
      --white:#fff;
      --panel:rgba(255,255,255,.54);
      --line:rgba(31,40,39,.14);
      --shadow:0 24px 80px rgba(31,40,39,.14);
    }

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:var(--bg)}
    body{background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:72px 72px,72px 72px;overflow-x:hidden}
    a{color:inherit}

    .page{width:min(1100px,calc(100% - 32px));min-height:100vh;margin:0 auto;display:grid;place-items:center;padding:32px 0}
    .canvas{position:relative;width:min(100%,1050px);height:min(700px,82vh);min-height:560px}
    .title{position:absolute;left:64px;top:185px;margin:0;color:var(--text);font-size:clamp(118px,22vw,250px);line-height:.82;font-weight:900;letter-spacing:-.07em;will-change:transform,opacity,filter}
    .subtitle{position:absolute;left:82px;top:405px;max-width:560px;margin:0;color:var(--muted);font-size:clamp(18px,2vw,24px);font-weight:800;line-height:1.55;will-change:transform,opacity,filter}
    .tag{position:absolute;display:inline-flex;align-items:center;justify-content:center;border-radius:12px;font-weight:900;user-select:none;white-space:nowrap;will-change:transform,opacity,filter}
    .tag-lost{left:340px;top:128px;padding:8px 30px;color:var(--blue);border:4px solid var(--blue);background:transparent;font-size:clamp(28px,4vw,58px);letter-spacing:.02em;transform:rotate(-8deg)}
    .tag-lost .corner{position:absolute;width:12px;height:12px;border:3px solid var(--blue);background:var(--bg);border-radius:4px}
    .tag-lost .tl{left:-12px;top:-12px}.tag-lost .tr{right:-12px;top:-12px}.tag-lost .bl{left:-12px;bottom:-12px}.tag-lost .br{right:-12px;bottom:-12px}
    .tag-code{left:118px;top:512px;padding:14px 28px;color:var(--blue);background:var(--yellow);border-radius:20px;font-size:clamp(24px,3vw,42px);transform:rotate(6deg)}
    .arrow{position:absolute;left:662px;top:518px;width:70px;height:70px;transform:rotate(22deg);will-change:transform,opacity,filter}
    .arrow::before{content:"";position:absolute;inset:0;background:var(--blue);clip-path:polygon(0 50%,100% 0,70% 48%,100% 100%);border-radius:8px}
    .actions{position:absolute;left:710px;top:590px;display:flex;flex-wrap:wrap;gap:10px;will-change:transform,opacity,filter}
    .button{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:999px;padding:13px 20px;text-decoration:none;background:rgba(255,255,255,.5);font-size:15px;font-weight:900;box-shadow:0 10px 28px rgba(31,40,39,.08);transition:transform .2s ease,box-shadow .2s ease}
    .button.primary{border-color:transparent;color:var(--white);background:var(--blue)}
    .button:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(23,54,198,.16)}
    .panel{position:absolute;right:0;top:28px;width:min(360px,34vw);padding:20px;border:1px solid var(--line);border-radius:28px;background:var(--panel);box-shadow:var(--shadow);backdrop-filter:blur(16px);will-change:transform,opacity,filter}
    .panel-label{margin:0 0 10px;color:var(--muted);font-size:12px;font-weight:900;letter-spacing:.14em;text-transform:uppercase}
    .panel-text{margin:0;overflow-wrap:anywhere;font-size:clamp(18px,2vw,26px);font-weight:900;letter-spacing:-.04em;line-height:1.2}
    .panel-note{margin:12px 0 0;color:var(--muted);line-height:1.65}

    .reveal{opacity:0;filter:blur(6px);transform:translateY(24px) scale(.98);animation:revealUp var(--dur,700ms) cubic-bezier(.2,.65,.2,1) forwards;animation-delay:var(--delay,0ms)}
    .reveal-left{opacity:0;filter:blur(6px);transform:translateX(-30px) rotate(var(--rot,0deg)) scale(.96);animation:revealLeft var(--dur,700ms) cubic-bezier(.2,.65,.2,1) forwards;animation-delay:var(--delay,0ms)}
    .reveal-right{opacity:0;filter:blur(6px);transform:translateX(30px) rotate(var(--rot,0deg)) scale(.96);animation:revealRight var(--dur,700ms) cubic-bezier(.2,.65,.2,1) forwards;animation-delay:var(--delay,0ms)}
    .reveal-pop{opacity:0;filter:blur(4px);transform:scale(.86) rotate(var(--rot,0deg));animation:revealPop var(--dur,680ms) cubic-bezier(.2,.7,.2,1.1) forwards;animation-delay:var(--delay,0ms)}
    @keyframes revealUp{to{opacity:1;filter:blur(0);transform:translateY(0) scale(1)}}
    @keyframes revealLeft{to{opacity:1;filter:blur(0);transform:translateX(0) rotate(var(--rot,0deg)) scale(1)}}
    @keyframes revealRight{to{opacity:1;filter:blur(0);transform:translateX(0) rotate(var(--rot,0deg)) scale(1)}}
    @keyframes revealPop{to{opacity:1;filter:blur(0);transform:scale(1) rotate(var(--rot,0deg))}}

    @media (max-width:900px){
      .page{width:min(100% - 24px,720px);display:block;padding:36px 0}
      .canvas{height:auto;min-height:0;display:grid;gap:14px}
      .title,.subtitle,.tag,.arrow,.actions,.panel{position:relative;left:auto;right:auto;top:auto;width:auto;max-width:none}
      .panel{order:-1}
      .title{font-size:clamp(104px,34vw,180px)}
      .subtitle{font-size:18px}
      .tag-lost,.tag-code,.arrow{justify-self:start}
      .tag-lost{font-size:clamp(28px,9vw,48px)}
      .tag-code{font-size:clamp(24px,7vw,38px)}
      .arrow{width:54px;height:54px;margin-left:42%}
      .actions{display:flex}
    }

    @media (prefers-reduced-motion:reduce){.reveal,.reveal-left,.reveal-right,.reveal-pop{animation:none!important;opacity:1!important;filter:none!important;transform:none!important}}
  </style>
</head>
<body>
  <main class="page">
    <section class="canvas" aria-label="404 页面未找到">
      <aside class="panel reveal-pop" style="--delay:80ms;--dur:680ms">
        <p class="panel-label">Route Missing</p>
        <p class="panel-text">这个地址没有对应页面。</p>
        <p class="panel-note">可能是链接已失效、路径拼写错误，或资源已经移动。</p>
      </aside>

      <div class="tag tag-lost reveal-left" style="--rot:-8deg;--delay:240ms;--dur:720ms">
        <span>Not Found</span>
        <i class="corner tl"></i><i class="corner tr"></i><i class="corner bl"></i><i class="corner br"></i>
      </div>

      <h1 class="title reveal" style="--delay:120ms;--dur:820ms">404</h1>
      <p class="subtitle reveal" style="--delay:340ms;--dur:760ms">页面走丢了，但双栈检测服务还在正常工作。</p>
      <div class="tag tag-code reveal-pop" style="--rot:6deg;--delay:420ms;--dur:680ms">HTTP 404</div>
      <div class="arrow reveal-right" style="--rot:22deg;--delay:520ms;--dur:620ms" aria-hidden="true"></div>

      <nav class="actions reveal-right" style="--delay:620ms;--dur:680ms" aria-label="404 页面操作">
        <a class="button primary" href="/">返回首页</a>
        <a class="button" href="/api/check">查看 API</a>
      </nav>
    </section>
  </main>
</body>
</html>
