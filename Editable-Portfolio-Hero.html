<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editable Portfolio Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#d9dbdf;
      --grid:rgba(0,0,0,.04);
      --text:#1f2827;
      --blue:#1736c6;
      --yellow:#f5ea18;
      --white:#fff;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      font-family:"Inter","PingFang SC","Microsoft YaHei",sans-serif;
      background:var(--bg);
      overflow:hidden;
    }

    body{
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size:72px 72px,72px 72px;
    }

    .hero{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }

    .canvas{
      position:relative;
      width:min(1100px,95vw);
      height:min(700px,82vh);
      transform-origin:center;
    }

    .title{
      position:absolute;
      margin:0;
      color:var(--text);
      font-size:clamp(84px,15vw,220px);
      line-height:.9;
      font-weight:900;
      letter-spacing:-.02em;
      will-change:transform,opacity,filter;
    }

    .tag{
      position:absolute;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      font-weight:800;
      user-select:none;
      will-change:transform,opacity,filter;
    }

    .tag-uiux{
      color:var(--blue);
      border:4px solid var(--blue);
      background:transparent;
      font-size:clamp(28px,3vw,58px);
      letter-spacing:.02em;
    }

    .tag-uiux .corner{
      position:absolute;
      width:12px;height:12px;
      border:3px solid var(--blue);
      background:var(--bg);
      border-radius:4px;
    }
    .tag-uiux .tl{left:-12px;top:-12px}
    .tag-uiux .tr{right:-12px;top:-12px}
    .tag-uiux .bl{left:-12px;bottom:-12px}
    .tag-uiux .br{right:-12px;bottom:-12px}

    .tag-year{
      color:var(--blue);
      background:var(--yellow);
      border-radius:20px;
    }

    .status{
      position:absolute;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      color:var(--white);
      background:var(--blue);
      border-radius:28px;
      font-weight:700;
      line-height:1;
      transition:transform .2s ease, box-shadow .2s ease;
      will-change:transform,opacity,filter;
    }
    .status:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 20px rgba(23,54,198,.25);
    }

    .arrow{
      position:absolute;
      will-change:transform,opacity,filter;
    }
    .arrow::before{
      content:"";
      position:absolute;
      inset:0;
      background:var(--blue);
      clip-path:polygon(0 50%,100% 0,70% 48%,100% 100%);
      border-radius:8px;
    }

    /* 入场动画 */
    .reveal{
      opacity:0;
      filter:blur(6px);
      transform:translateY(24px) scale(.98);
      animation:revealUp var(--dur,700ms) cubic-bezier(.2,.65,.2,1) forwards;
      animation-delay:var(--delay,0ms);
    }
    .reveal-left{
      opacity:0;
      filter:blur(6px);
      transform:translateX(-30px) rotate(var(--rot,0deg)) scale(.96);
      animation:revealLeft var(--dur,700ms) cubic-bezier(.2,.65,.2,1) forwards;
      animation-delay:var(--delay,0ms);
    }
    .reveal-right{
      opacity:0;
      filter:blur(6px);
      transform:translateX(30px) rotate(var(--rot,0deg)) scale(.96);
      animation:revealRight var(--dur,700ms) cubic-bezier(.2,.65,.2,1) forwards;
      animation-delay:var(--delay,0ms);
    }
    .reveal-pop{
      opacity:0;
      filter:blur(4px);
      transform:scale(.86) rotate(var(--rot,0deg));
      animation:revealPop var(--dur,680ms) cubic-bezier(.2,.7,.2,1.1) forwards;
      animation-delay:var(--delay,0ms);
    }

    @keyframes revealUp{
      to{opacity:1;filter:blur(0);transform:translateY(0) scale(1);}
    }
    @keyframes revealLeft{
      to{opacity:1;filter:blur(0);transform:translateX(0) rotate(var(--rot,0deg)) scale(1);}
    }
    @keyframes revealRight{
      to{opacity:1;filter:blur(0);transform:translateX(0) rotate(var(--rot,0deg)) scale(1);}
    }
    @keyframes revealPop{
      to{opacity:1;filter:blur(0);transform:scale(1) rotate(var(--rot,0deg));}
    }

    /* 减少动态偏好 */
    @media (prefers-reduced-motion: reduce){
      .reveal,.reveal-left,.reveal-right,.reveal-pop{
        animation:none !important;
        opacity:1 !important;
        filter:none !important;
        transform:none !important;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <section id="canvas" class="canvas">
      <div id="tagUIUX" class="tag tag-uiux reveal-left">
        <span id="uiuxText">UI/UX</span>
        <i class="corner tl"></i><i class="corner tr"></i><i class="corner bl"></i><i class="corner br"></i>
      </div>

      <h1 id="title" class="title reveal">Portfolio</h1>

      <div id="tagYear" class="tag tag-year reveal-pop">2024–2025</div>

      <div id="arrow" class="arrow reveal-right" aria-hidden="true"></div>

      <a id="status" class="status reveal-right" href="javascript:void(0)">求职中 ✨</a>
    </section>
  </main>

  <script>
    /**
     * ============================
     *  可编辑参数区（重点改这里）
     * ============================
     */
    const CONFIG = {
      text: {
        title: "Portfolio",
        uiux: "UI/UX",
        year: "2024–2025",
        status: "求职中 ✨"
      },

      colors: {
        bg: "#d9dbdf",
        grid: "rgba(0,0,0,0.04)",
        text: "#1f2827",
        blue: "#1736c6",
        yellow: "#f5ea18",
        white: "#ffffff"
      },

      // 画布大小（可选）
      canvas: {
        width: "min(1100px,95vw)",
        height: "min(700px,82vh)"
      },

      // 元素位置与样式（left/top 支持 px、%、vw 等）
      layout: {
        title: { left: "80px", top: "220px", fontSize: "clamp(84px,15vw,220px)", rotate: "0deg" },
        uiux:  { left: "320px", top: "145px", padding: "8px 30px", fontSize: "clamp(28px,3vw,58px)", rotate: "-8deg", borderWidth: "4px" },
        year:  { left: "140px", top: "490px", padding: "14px 28px", fontSize: "clamp(24px,2vw,42px)", rotate: "6deg", radius: "20px" },
        arrow: { left: "670px", top: "535px", size: "70px", rotate: "22deg" },
        status:{ left: "720px", top: "610px", padding: "14px 30px", fontSize: "clamp(24px,2vw,44px)", rotate: "0deg", radius: "28px" }
      },

      // 入场动画：类型 + 延迟 + 时长
      animation: {
        enabled: true,
        items: {
          title:  { type: "reveal",       delay: 120, dur: 820 },
          uiux:   { type: "reveal-left",  delay: 260, dur: 720 },
          year:   { type: "reveal-pop",   delay: 420, dur: 680 },
          arrow:  { type: "reveal-right", delay: 520, dur: 620 },
          status: { type: "reveal-right", delay: 620, dur: 680 }
        }
      }
    };

    /** 应用配置 */
    function applyConfig(cfg){
      const root = document.documentElement;
      const canvas = document.getElementById("canvas");
      const title = document.getElementById("title");
      const uiux = document.getElementById("tagUIUX");
      const uiuxText = document.getElementById("uiuxText");
      const year = document.getElementById("tagYear");
      const arrow = document.getElementById("arrow");
      const status = document.getElementById("status");

      // 文案
      title.textContent = cfg.text.title;
      uiuxText.textContent = cfg.text.uiux;
      year.textContent = cfg.text.year;
      status.textContent = cfg.text.status;

      // 颜色变量
      root.style.setProperty("--bg", cfg.colors.bg);
      root.style.setProperty("--grid", cfg.colors.grid);
      root.style.setProperty("--text", cfg.colors.text);
      root.style.setProperty("--blue", cfg.colors.blue);
      root.style.setProperty("--yellow", cfg.colors.yellow);
      root.style.setProperty("--white", cfg.colors.white);

      // 画布
      canvas.style.width = cfg.canvas.width;
      canvas.style.height = cfg.canvas.height;

      // 标题
      setPos(title, cfg.layout.title);
      title.style.fontSize = cfg.layout.title.fontSize;
      title.style.transform = `rotate(${cfg.layout.title.rotate})`;

      // UIUX
      setPos(uiux, cfg.layout.uiux);
      uiux.style.padding = cfg.layout.uiux.padding;
      uiux.style.fontSize = cfg.layout.uiux.fontSize;
      uiux.style.borderWidth = cfg.layout.uiux.borderWidth;
      uiux.style.transform = `rotate(${cfg.layout.uiux.rotate})`;
      uiux.style.setProperty("--rot", cfg.layout.uiux.rotate);

      // Year
      setPos(year, cfg.layout.year);
      year.style.padding = cfg.layout.year.padding;
      year.style.fontSize = cfg.layout.year.fontSize;
      year.style.borderRadius = cfg.layout.year.radius;
      year.style.transform = `rotate(${cfg.layout.year.rotate})`;
      year.style.setProperty("--rot", cfg.layout.year.rotate);

      // Arrow
      setPos(arrow, cfg.layout.arrow);
      arrow.style.width = cfg.layout.arrow.size;
      arrow.style.height = cfg.layout.arrow.size;
      arrow.style.transform = `rotate(${cfg.layout.arrow.rotate})`;
      arrow.style.setProperty("--rot", cfg.layout.arrow.rotate);

      // Status
      setPos(status, cfg.layout.status);
      status.style.padding = cfg.layout.status.padding;
      status.style.fontSize = cfg.layout.status.fontSize;
      status.style.borderRadius = cfg.layout.status.radius;
      status.style.transform = `rotate(${cfg.layout.status.rotate})`;
      status.style.setProperty("--rot", cfg.layout.status.rotate);

      // 动画
      applyAnimation(cfg.animation);
    }

    function setPos(el, opt){
      el.style.left = opt.left;
      el.style.top = opt.top;
    }

    function applyAnimation(animCfg){
      const map = {
        title: document.getElementById("title"),
        uiux: document.getElementById("tagUIUX"),
        year: document.getElementById("tagYear"),
        arrow: document.getElementById("arrow"),
        status: document.getElementById("status")
      };

      Object.entries(map).forEach(([key, el]) => {
        el.classList.remove("reveal","reveal-left","reveal-right","reveal-pop");
        el.style.removeProperty("--delay");
        el.style.removeProperty("--dur");
      });

      if (!animCfg?.enabled) {
        Object.values(map).forEach(el => {
          el.style.opacity = "1";
          el.style.filter = "none";
        });
        return;
      }

      for (const key in animCfg.items){
        const item = animCfg.items[key];
        const el = map[key];
        if(!el || !item) continue;
        el.classList.add(item.type || "reveal");
        el.style.setProperty("--delay", `${item.delay || 0}ms`);
        el.style.setProperty("--dur", `${item.dur || 700}ms`);
      }
    }

    // 初始化
    applyConfig(CONFIG);

    // 方便你在控制台实时改：window.CONFIG / window.applyConfig
    window.CONFIG = CONFIG;
    window.applyConfig = applyConfig;
  </script>
</body>
</html>
